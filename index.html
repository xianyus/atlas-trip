<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#153b38" />
  <title>Atlas Trip — 旅遊地圖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#153b38;--coral:#ef715e;--paper:#fffdfa;--sand:#f7f2ec;--line:#e8dfd5;--muted:#77817c;font-family:"DM Sans","Noto Sans TC",sans-serif;color:var(--ink)}*{box-sizing:border-box}body{margin:0;background:var(--sand)}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{height:100vh;overflow:hidden}.topbar{height:68px;display:flex;align-items:center;justify-content:space-between;background:var(--paper);border-bottom:1px solid var(--line);padding:0 28px;position:relative;z-index:10}.brand{font-size:22px;font-weight:700;letter-spacing:-1.2px;display:flex;align-items:center;gap:9px}.brand-symbol{width:31px;height:31px;border-radius:50%;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-family:Georgia,serif;font-size:19px;font-style:italic}.brand i{color:var(--coral);font-style:normal}.actions{display:flex;align-items:center;gap:9px}.quiet{color:var(--muted);font-size:12px;margin-right:8px}.action,.primary{border:0;border-radius:9px;padding:9px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}.action{background:transparent;color:#49625b}.primary{color:#fff;background:var(--coral);box-shadow:0 7px 16px #ef715e42}.workspace{height:calc(100vh - 68px);display:grid;grid-template-columns:380px 1fr}.sidebar{background:var(--paper);border-right:1px solid var(--line);padding:19px;overflow-y:auto}.cover{height:189px;border-radius:15px;background:linear-gradient(180deg,transparent 25%,#153b38 100%),url("https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1000&q=85") center/cover;color:white;padding:18px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0 10px 24px #173c3b25}.eyebrow{font-size:9px;letter-spacing:1.7px;font-weight:700;color:#ffb09d}.cover h1{margin:7px 0 6px;font-size:25px;letter-spacing:-1px}.cover p{font-size:11px;margin:0;color:#e9efeb}.section-header{display:flex;justify-content:space-between;margin:22px 2px 12px;font-size:13px;font-weight:700}.section-header span:last-child{color:#9a9892;font-size:11px;font-weight:500}.days{display:flex;gap:7px;margin-bottom:13px}.day{width:48px;height:48px;border:1px solid #eee4d9;border-radius:9px;background:transparent;color:#969891;font-size:8px;line-height:13px;letter-spacing:1px}.day b{font-size:14px;color:#53655e}.day.active{background:var(--ink);border-color:var(--ink);color:#a9c5bb}.day.active b{color:#fff}.place-list{display:grid;gap:7px}.place{width:100%;border:1px solid transparent;background:transparent;border-radius:12px;display:flex;gap:10px;align-items:center;padding:8px;text-align:left;color:var(--ink)}.place:hover,.place.active{background:#f7f2ec;border-color:#eee4da}.place img{width:47px;height:47px;object-fit:cover;border-radius:8px}.place-info{min-width:0;flex:1}.place time{font-size:10px;color:var(--coral);font-weight:700}.place strong,.place em{display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.place strong{font-size:13px;margin-top:2px}.place em{font-size:10px;font-style:normal;color:#97958e;margin-top:2px}.chevron{font-size:18px;color:#a5aaa5}.add{width:100%;margin-top:14px;border:1px dashed #d5c8bb;border-radius:10px;padding:11px;background:var(--paper);color:#53726a;font-weight:700;font-size:12px}.map-stage{position:relative;min-width:0}.map{height:100%;width:100%;border:0;background:#d9e7df}.search{position:absolute;top:22px;left:50%;z-index:1000;transform:translateX(-50%);width:min(480px,68%);height:48px;background:#fff;box-shadow:0 12px 34px #173c3b23;border:1px solid var(--line);border-radius:11px;display:flex;align-items:center;padding:0 7px 0 14px;gap:9px}.search label{font-size:18px;color:var(--coral)}.search input{min-width:0;flex:1;border:0;outline:0;font-size:13px}.search button{border:0;border-radius:7px;background:var(--ink);color:white;padding:8px 12px;font-size:11px;font-weight:700}.map-tools{position:absolute;z-index:1000;right:18px;top:20px;display:grid;gap:8px}.map-tools button{border:0;background:#fff;width:40px;height:40px;border-radius:10px;color:var(--ink);box-shadow:0 6px 17px #173c3b22;font-size:17px}.detail{position:absolute;z-index:1000;left:22px;bottom:24px;width:350px;background:var(--paper);border-radius:15px;box-shadow:0 17px 40px #173c3b38;overflow:hidden}.detail img{display:block;width:100%;height:145px;object-fit:cover}.detail-body{padding:16px 19px 19px}.detail-label{font-size:10px;color:var(--coral);font-weight:700;letter-spacing:1px}.detail h2{font-size:22px;letter-spacing:-.7px;margin:7px 0 0}.subtitle{color:#918e88;font-size:12px;margin:1px 0 11px}.note{color:#53635e;font-size:12px;line-height:1.65;margin:0}.coords{font-size:10px;color:#7d8983;border-top:1px solid var(--line);padding:12px 0;margin:13px 0 0}.save,.edit{border:0;width:100%;border-radius:8px;padding:10px;font-size:12px;font-weight:700}.save{background:#f8efea;color:#d55d4d;margin-top:8px}.edit{background:var(--ink);color:#fff}.toast{position:fixed;z-index:3000;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;background:var(--ink);padding:11px 15px;border-radius:10px;font-size:13px;box-shadow:0 10px 25px #173c3b55;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}.dialog{position:fixed;inset:0;z-index:2500;background:#153b3880;display:none;place-items:center;padding:18px}.dialog.show{display:grid}.dialog-card{background:var(--paper);width:min(430px,100%);max-height:90vh;overflow:auto;padding:28px;border-radius:16px;box-shadow:0 20px 55px #173c3b77;text-align:center}.dialog-card h2{margin:6px 0 8px}.dialog-card p{font-size:13px;color:#63736d;line-height:1.6}.dialog-card button{margin-top:8px}.editor{text-align:left}.editor h2{text-align:center}.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:17px 0}.fields label{font-size:11px;color:#63736d;font-weight:700;display:grid;gap:5px}.fields .full{grid-column:1/-1}.fields input,.fields textarea,.fields select{width:100%;border:1px solid #ded6cc;border-radius:8px;padding:9px;background:#fff;color:var(--ink);outline-color:var(--coral)}.fields textarea{resize:vertical;min-height:65px}.editor-actions{display:flex;gap:8px}.editor-actions button{flex:1}.danger{border:1px solid #edc9c0;background:#fff7f5;color:#ce5a49;border-radius:9px;font-weight:700}.cancel{border:1px solid var(--line);background:#fff;color:#60736b;border-radius:9px;font-weight:700}.close{border:0;background:none;color:var(--muted);font-size:12px}@media(max-width:760px){.topbar{height:60px;padding:0 14px}.quiet,.action{display:none}.workspace{height:calc(100vh - 60px);display:block}.sidebar{position:absolute;z-index:1100;width:min(355px,88vw);height:calc(100vh - 60px);box-shadow:8px 0 24px #153b3826}.search{left:calc(50% + 24px);width:54%;top:14px}.detail{left:auto;right:14px;bottom:14px;width:min(350px,calc(100vw - 28px))}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><div class="brand"><span class="brand-symbol">A</span>atlas<i>trip</i></div><div class="actions"><span class="quiet">● 已儲存在此裝置</span><button class="action" id="download">▣ 匯出海報</button><button class="action" id="share">↗ 分享</button><button class="primary" id="cloud">☁ 登入同步</button></div></header>
    <section class="workspace">
      <aside class="sidebar"><section class="cover"><span class="eyebrow">NEXT ADVENTURE</span><h1 id="trip-title">京都・春日漫遊</h1><p>📍 Kyoto, Japan · 2026.04.03 — 04.07</p></section><div class="section-header"><span>行程時間軸</span><span id="count"></span></div><div class="days" id="days"></div><div class="place-list" id="place-list"></div><button class="add" id="add">＋ 新增行程地點</button></aside>
      <section class="map-stage"><iframe class="map" id="map" title="Google 地圖" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe><form class="search" id="search"><label>⌕</label><input id="search-text" autocomplete="off" placeholder="搜尋地點，自動帶入座標…" /><button>搜尋</button></form><div class="map-tools"><button title="在 Google 地圖開啟" id="home">↗</button><button title="顯示行程第一站" id="all">⌖</button></div><article class="detail" id="detail"></article></section>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <div class="dialog" id="dialog"><div class="dialog-card"><div style="font-size:32px">☁</div><h2>雲端同步準備中</h2><p>這個 GitHub Pages 版本可直接使用地圖與行程；目前資料會保存在你的瀏覽器。日後接上 Supabase 後，即可跨裝置同步和分享。</p><button class="primary" id="dialog-close">知道了</button></div></div>
  <div class="dialog" id="edit-dialog"><form class="dialog-card editor" id="edit-form"><h2 id="editor-title">編輯行程地點</h2><div class="fields"><label class="full">地點名稱<input required name="name" /></label><label>第幾天<select name="day"></select></label><label>時間<input required name="time" placeholder="09:30" /></label><label>類型<input name="type" placeholder="景點／美食／住宿" /></label><label>英文名稱<input name="sub" /></label><label>緯度<input required name="lat" inputmode="decimal" /></label><label>經度<input required name="lng" inputmode="decimal" /></label><label class="full">旅遊筆記<textarea name="note"></textarea></label><label class="full">照片網址（可留空）<input name="photo" placeholder="https://…" /></label></div><div class="editor-actions"><button class="cancel" type="button" id="edit-cancel">取消</button><button class="danger" type="button" id="edit-delete">刪除</button><button class="primary" type="submit">儲存變更</button></div></form></div>
  <script>
    const key="atlas-trip-pages-v1";
    const defaults=[
      {id:"a",day:1,time:"09:30",name:"清水寺",sub:"Kiyomizu-dera",lat:34.9949,lng:135.7850,type:"寺院",photo:"https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=700&q=80",note:"早晨抵達，從仁王門一路散步至舞台。"},
      {id:"b",day:1,time:"12:30",name:"二年坂・三年坂",sub:"Ninenzaka & Sannenzaka",lat:34.9966,lng:135.7807,type:"散步",photo:"https://images.unsplash.com/photo-1542051841857-5f90071e7989?auto=format&fit=crop&w=700&q=80",note:"預留時間逛小店與喝咖啡。"},
      {id:"c",day:2,time:"08:00",name:"伏見稻荷大社",sub:"Fushimi Inari Taisha",lat:34.9671,lng:135.7727,type:"神社",photo:"https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=700&q=80",note:"避開人潮，清早走千本鳥居。"},
      {id:"d",day:2,time:"15:00",name:"鴨川納涼床",sub:"Kamo River",lat:35.0095,lng:135.7694,type:"美食",photo:"https://images.unsplash.com/photo-1526481280695-3c687fd643ed?auto=format&fit=crop&w=700&q=80",note:"傍晚沿河散步，尋找晚餐。"},
      {id:"e",day:3,time:"10:00",name:"嵐山竹林",sub:"Arashiyama Bamboo Grove",lat:35.017,lng:135.6713,type:"自然",photo:"https://images.unsplash.com/photo-1545569341-9eb8b30979d9?auto=format&fit=crop&w=700&q=80",note:"搭嵐電前往，順遊天龍寺。"}
    ];
    let places=JSON.parse(localStorage.getItem(key)||"null")||defaults, day=1, selected=places[0].id, editingId=null;
    const $=s=>document.querySelector(s), escape=v=>String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    function toast(message){const el=$("#toast");el.textContent=message;el.classList.add("show");clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.remove("show"),2600)}
    function save(){localStorage.setItem(key,JSON.stringify(places))}
    function current(){return places.filter(p=>p.day===day)}
    function render(){const days=[...new Set(places.map(p=>p.day))].sort((a,b)=>a-b);$("#count").textContent=`${places.length} places`;$("#days").innerHTML=days.map(d=>`<button class="day ${d===day?"active":""}" data-day="${d}">DAY<br><b>${String(d).padStart(2,"0")}</b></button>`).join("");document.querySelectorAll(".day").forEach(b=>b.onclick=()=>{day=+b.dataset.day;selected=current()[0]?.id;render()});$("#place-list").innerHTML=current().map(p=>`<button class="place ${p.id===selected?"active":""}" data-id="${p.id}"><img src="${p.photo}" alt=""><span class="place-info"><time>${p.time} · ${escape(p.type)}</time><strong>${escape(p.name)}</strong><em>${escape(p.sub)}</em></span><span class="chevron">›</span></button>`).join("");document.querySelectorAll(".place").forEach(b=>b.onclick=()=>{selected=b.dataset.id;render()});renderGoogleMap();renderDetail()}
    function renderGoogleMap(){const p=places.find(x=>x.id===selected)||places[0];if(!p)return;const query=encodeURIComponent(`${p.lat},${p.lng}`);$("#map").src=`https://www.google.com/maps?q=${query}&z=15&output=embed`}
    function renderDetail(){const p=places.find(x=>x.id===selected);if(!p){$("#detail").innerHTML="";return}$("#detail").innerHTML=`<img src="${p.photo}" alt="${escape(p.name)}"><div class="detail-body"><div class="detail-label">DAY ${String(p.day).padStart(2,"0")} · ${p.time}</div><h2>${escape(p.name)}</h2><p class="subtitle">${escape(p.sub)}</p><p class="note">${escape(p.note)}</p><div class="coords">📍 ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)} · ${escape(p.type)}</div><button class="edit" id="edit-place">✎ 編輯此地點</button><button class="save" id="favorite">♡ 收藏這個地點</button></div>`;$("#favorite").onclick=()=>toast("已收藏到你的旅遊靈感");$("#edit-place").onclick=()=>openEditor(p)}
    $("#search").onsubmit=async e=>{e.preventDefault();const q=$("#search-text").value.trim();if(!q)return;toast("正在搜尋地點…");try{const r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q="+encodeURIComponent(q));const [v]=await r.json();if(!v)throw Error();const p={id:crypto.randomUUID(),day,time:"14:00",name:v.display_name.split(",")[0],sub:v.display_name,lat:+v.lat,lng:+v.lon,type:"新地點",photo:"https://images.unsplash.com/photo-1526481280695-3c687fd643ed?auto=format&fit=crop&w=700&q=80",note:"由搜尋加入，點擊地圖卡片查看座標與旅遊筆記。"};places.push(p);selected=p.id;$("#search-text").value="";save();render();toast("已加入 Day "+day+" 行程")}catch{toast("找不到地點，請試試更完整的名稱")}};
    function openEditor(p){editingId=p.id;const f=$("#edit-form"), get=n=>f.elements.namedItem(n), days=[...new Set([...places.map(x=>x.day),p.day])].sort((a,b)=>a-b);$("#editor-title").textContent=p.id?"編輯行程地點":"新增行程地點";get("name").value=p.name;get("time").value=p.time;get("type").value=p.type;get("sub").value=p.sub;get("lat").value=Number(p.lat).toFixed(6);get("lng").value=Number(p.lng).toFixed(6);get("note").value=p.note;get("photo").value=p.photo;get("day").innerHTML=days.map(d=>`<option value="${d}" ${d===p.day?"selected":""}>Day ${String(d).padStart(2,"0")}</option>`).join("")+`<option value="${Math.max(...days)+1}">Day ${String(Math.max(...days)+1).padStart(2,"0")}（新增一天）</option>`;$("#edit-delete").style.display=p.id?"block":"none";$("#edit-dialog").classList.add("show")}
    $("#edit-cancel").onclick=()=>$("#edit-dialog").classList.remove("show");$("#edit-delete").onclick=()=>{if(!editingId||!confirm("確定要刪除這個地點嗎？"))return;places=places.filter(p=>p.id!==editingId);selected=places.find(p=>p.day===day)?.id||places[0]?.id;save();$("#edit-dialog").classList.remove("show");render();toast("地點已刪除")};$("#edit-form").onsubmit=e=>{e.preventDefault();const f=e.currentTarget,v=Object.fromEntries(new FormData(f));const lat=Number(v.lat),lng=Number(v.lng);if(!Number.isFinite(lat)||!Number.isFinite(lng)){toast("請填入正確的經緯度");return}const p={id:editingId||crypto.randomUUID(),day:Number(v.day),time:v.time.trim(),name:v.name.trim(),sub:v.sub.trim()||v.name.trim(),lat,lng,type:v.type.trim()||"待安排",photo:v.photo.trim()||"https://images.unsplash.com/photo-1542051841857-5f90071e7989?auto=format&fit=crop&w=700&q=80",note:v.note.trim()||"尚未新增旅遊筆記。"};if(editingId)places=places.map(x=>x.id===editingId?p:x);else places.push(p);day=p.day;selected=p.id;save();$("#edit-dialog").classList.remove("show");render();toast(editingId?"行程已更新":"新地點已加入")};
    $("#add").onclick=()=>openEditor({id:null,day,time:"14:00",name:"",sub:"",lat:35.0116,lng:135.7681,type:"待安排",photo:"",note:""});
    $("#home").onclick=()=>{const p=places.find(x=>x.id===selected)||places[0];window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${p.lat},${p.lng}`)}`,"_blank")};$("#all").onclick=()=>{day=places[0]?.day||1;selected=places[0]?.id;render()};$("#share").onclick=async()=>{try{if(navigator.share)await navigator.share({title:"Atlas Trip｜京都・春日漫遊",url:location.href});else{await navigator.clipboard.writeText(location.href);toast("網址已複製，可直接分享給旅伴")}}catch{}};$("#cloud").onclick=()=>$("#dialog").classList.add("show");$("#dialog-close").onclick=()=>$("#dialog").classList.remove("show");
    $("#download").onclick=()=>{const c=document.createElement("canvas");c.width=1080;c.height=1350;const x=c.getContext("2d");x.fillStyle="#153b38";x.fillRect(0,0,c.width,c.height);x.fillStyle="#ef715e";x.globalAlpha=.15;x.beginPath();x.arc(910,150,330,0,Math.PI*2);x.fill();x.globalAlpha=1;x.fillStyle="#ffb09d";x.font="700 28px sans-serif";x.fillText("ATLAS TRIP",84,130);x.fillStyle="#fffdfa";x.font="700 68px sans-serif";x.fillText("京都・春日漫遊",84,230);x.fillStyle="#d8e4dd";x.font="32px sans-serif";x.fillText("2026.04.03 — 04.07 · Kyoto, Japan",84,285);x.strokeStyle="#83a69b";x.lineWidth=6;x.setLineDash([15,17]);x.beginPath();x.moveTo(120,500);x.lineTo(900,500);x.stroke();x.setLineDash([]);current().slice(0,5).forEach((p,i)=>{const px=120+i*180;x.fillStyle="#ef715e";x.beginPath();x.arc(px,500,22,0,Math.PI*2);x.fill();x.fillStyle="#fffdfa";x.font="700 23px sans-serif";x.textAlign="center";x.fillText(i+1,px,508);x.fillStyle="#d8e4dd";x.font="25px sans-serif";x.fillText(p.name.slice(0,7),px,565)});x.textAlign="left";x.fillStyle="#fffdfa";x.font="600 36px sans-serif";x.fillText(`${places.length} 個收藏地點 · ${new Set(places.map(p=>p.day)).size} 天行程`,84,850);x.fillStyle="#d8e4dd";x.font="28px sans-serif";x.fillText("Made with Atlas Trip",84,1030);const a=document.createElement("a");a.download="atlas-trip-poster.png";a.href=c.toDataURL("image/png");a.click();toast("旅程海報已匯出")};
    render();
  </script>
</body>
</html>
