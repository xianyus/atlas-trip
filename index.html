<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#153b38" />
  <title>Atlas Trip — 旅遊地圖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ2XwzAAMHmsF2K9tK4TAtYlr2mX0nI=" crossorigin="" />
  <style>
    :root{--ink:#153b38;--coral:#ef715e;--paper:#fffdfa;--sand:#f7f2ec;--line:#e8dfd5;--muted:#77817c;font-family:"DM Sans","Noto Sans TC",sans-serif;color:var(--ink)}*{box-sizing:border-box}body{margin:0;background:var(--sand)}button,input{font:inherit}button{cursor:pointer}.app{height:100vh;overflow:hidden}.topbar{height:68px;display:flex;align-items:center;justify-content:space-between;background:var(--paper);border-bottom:1px solid var(--line);padding:0 28px;position:relative;z-index:10}.brand{font-size:22px;font-weight:700;letter-spacing:-1.2px;display:flex;align-items:center;gap:9px}.brand-symbol{width:31px;height:31px;border-radius:50%;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-family:Georgia,serif;font-size:19px;font-style:italic}.brand i{color:var(--coral);font-style:normal}.actions{display:flex;align-items:center;gap:9px}.quiet{color:var(--muted);font-size:12px;margin-right:8px}.action,.primary{border:0;border-radius:9px;padding:9px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}.action{background:transparent;color:#49625b}.primary{color:#fff;background:var(--coral);box-shadow:0 7px 16px #ef715e42}.workspace{height:calc(100vh - 68px);display:grid;grid-template-columns:380px 1fr}.sidebar{background:var(--paper);border-right:1px solid var(--line);padding:19px;overflow-y:auto}.cover{height:189px;border-radius:15px;background:linear-gradient(180deg,transparent 25%,#153b38 100%),url("https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1000&q=85") center/cover;color:white;padding:18px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0 10px 24px #173c3b25}.eyebrow{font-size:9px;letter-spacing:1.7px;font-weight:700;color:#ffb09d}.cover h1{margin:7px 0 6px;font-size:25px;letter-spacing:-1px}.cover p{font-size:11px;margin:0;color:#e9efeb}.section-header{display:flex;justify-content:space-between;margin:22px 2px 12px;font-size:13px;font-weight:700}.section-header span:last-child{color:#9a9892;font-size:11px;font-weight:500}.days{display:flex;gap:7px;margin-bottom:13px}.day{width:48px;height:48px;border:1px solid #eee4d9;border-radius:9px;background:transparent;color:#969891;font-size:8px;line-height:13px;letter-spacing:1px}.day b{font-size:14px;color:#53655e}.day.active{background:var(--ink);border-color:var(--ink);color:#a9c5bb}.day.active b{color:#fff}.place-list{display:grid;gap:7px}.place{width:100%;border:1px solid transparent;background:transparent;border-radius:12px;display:flex;gap:10px;align-items:center;padding:8px;text-align:left;color:var(--ink)}.place:hover,.place.active{background:#f7f2ec;border-color:#eee4da}.place img{width:47px;height:47px;object-fit:cover;border-radius:8px}.place-info{min-width:0;flex:1}.place time{font-size:10px;color:var(--coral);font-weight:700}.place strong,.place em{display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.place strong{font-size:13px;margin-top:2px}.place em{font-size:10px;font-style:normal;color:#97958e;margin-top:2px}.chevron{font-size:18px;color:#a5aaa5}.add{width:100%;margin-top:14px;border:1px dashed #d5c8bb;border-radius:10px;padding:11px;background:var(--paper);color:#53726a;font-weight:700;font-size:12px}.map-stage{position:relative;min-width:0}.map{height:100%;width:100%;background:#d9e7df}.search{position:absolute;top:22px;left:50%;z-index:1000;transform:translateX(-50%);width:min(480px,68%);height:48px;background:#fff;box-shadow:0 12px 34px #173c3b23;border:1px solid var(--line);border-radius:11px;display:flex;align-items:center;padding:0 7px 0 14px;gap:9px}.search label{font-size:18px;color:var(--coral)}.search input{min-width:0;flex:1;border:0;outline:0;font-size:13px}.search button{border:0;border-radius:7px;background:var(--ink);color:white;padding:8px 12px;font-size:11px;font-weight:700}.map-tools{position:absolute;z-index:1000;right:18px;top:20px;display:grid;gap:8px}.map-tools button{border:0;background:#fff;width:40px;height:40px;border-radius:10px;color:var(--ink);box-shadow:0 6px 17px #173c3b22;font-size:17px}.detail{position:absolute;z-index:1000;left:22px;bottom:24px;width:350px;background:var(--paper);border-radius:15px;box-shadow:0 17px 40px #173c3b38;overflow:hidden}.detail img{display:block;width:100%;height:145px;object-fit:cover}.detail-body{padding:16px 19px 19px}.detail-label{font-size:10px;color:var(--coral);font-weight:700;letter-spacing:1px}.detail h2{font-size:22px;letter-spacing:-.7px;margin:7px 0 0}.subtitle{color:#918e88;font-size:12px;margin:1px 0 11px}.note{color:#53635e;font-size:12px;line-height:1.65;margin:0}.coords{font-size:10px;color:#7d8983;border-top:1px solid var(--line);padding:12px 0;margin:13px 0 0}.save{border:0;background:#f8efea;color:#d55d4d;width:100%;border-radius:8px;padding:10px;font-size:12px;font-weight:700}.marker-wrap{background:transparent!important;border:0!important}.marker{width:38px;height:38px;border:4px solid var(--paper);background:var(--coral);border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 4px 10px #6a302955;display:grid;place-items:center}.marker b{transform:rotate(45deg);font-size:12px;color:#fff}.marker.selected{background:var(--ink);transform:rotate(-45deg) scale(1.14)}.toast{position:fixed;z-index:3000;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;background:var(--ink);padding:11px 15px;border-radius:10px;font-size:13px;box-shadow:0 10px 25px #173c3b55;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}.leaflet-control-zoom a{color:var(--ink)!important}.dialog{position:fixed;inset:0;z-index:2500;background:#153b3880;display:none;place-items:center;padding:18px}.dialog.show{display:grid}.dialog-card{background:var(--paper);width:min(380px,100%);padding:28px;border-radius:16px;box-shadow:0 20px 55px #173c3b77;text-align:center}.dialog-card h2{margin:6px 0 8px}.dialog-card p{font-size:13px;color:#63736d;line-height:1.6}.dialog-card button{margin-top:8px}.close{border:0;background:none;color:var(--muted);font-size:12px}@media(max-width:760px){.topbar{height:60px;padding:0 14px}.quiet,.action{display:none}.workspace{height:calc(100vh - 60px);display:block}.sidebar{position:absolute;z-index:1100;width:min(355px,88vw);height:calc(100vh - 60px);box-shadow:8px 0 24px #153b3826}.search{left:calc(50% + 24px);width:54%;top:14px}.detail{left:auto;right:14px;bottom:14px;width:min(350px,calc(100vw - 28px))}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><div class="brand"><span class="brand-symbol">A</span>atlas<i>trip</i></div><div class="actions"><span class="quiet">● 已儲存在此裝置</span><button class="action" id="download">▣ 匯出海報</button><button class="action" id="share">↗ 分享</button><button class="primary" id="cloud">☁ 登入同步</button></div></header>
    <section class="workspace">
      <aside class="sidebar"><section class="cover"><span class="eyebrow">NEXT ADVENTURE</span><h1 id="trip-title">京都・春日漫遊</h1><p>📍 Kyoto, Japan · 2026.04.03 — 04.07</p></section><div class="section-header"><span>行程時間軸</span><span id="count"></span></div><div class="days" id="days"></div><div class="place-list" id="place-list"></div><button class="add" id="add">＋ 新增行程地點</button></aside>
      <section class="map-stage"><div class="map" id="map"></div><form class="search" id="search"><label>⌕</label><input id="search-text" autocomplete="off" placeholder="搜尋地點，自動帶入座標…" /><button>搜尋</button></form><div class="map-tools"><button title="回到京都" id="home">⌖</button><button title="顯示全部" id="all">⌘</button></div><article class="detail" id="detail"></article></section>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <div class="dialog" id="dialog"><div class="dialog-card"><div style="font-size:32px">☁</div><h2>雲端同步準備中</h2><p>這個 GitHub Pages 版本可直接使用地圖與行程；目前資料會保存在你的瀏覽器。日後接上 Supabase 後，即可跨裝置同步和分享。</p><button class="primary" id="dialog-close">知道了</button></div></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const key="atlas-trip-pages-v1";
    const defaults=[
      {id:"a",day:1,time:"09:30",name:"清水寺",sub:"Kiyomizu-dera",lat:34.9949,lng:135.7850,type:"寺院",photo:"https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=700&q=80",note:"早晨抵達，從仁王門一路散步至舞台。"},
      {id:"b",day:1,time:"12:30",name:"二年坂・三年坂",sub:"Ninenzaka & Sannenzaka",lat:34.9966,lng:135.7807,type:"散步",photo:"https://images.unsplash.com/photo-1542051841857-5f90071e7989?auto=format&fit=crop&w=700&q=80",note:"預留時間逛小店與喝咖啡。"},
      {id:"c",day:2,time:"08:00",name:"伏見稻荷大社",sub:"Fushimi Inari Taisha",lat:34.9671,lng:135.7727,type:"神社",photo:"https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=700&q=80",note:"避開人潮，清早走千本鳥居。"},
      {id:"d",day:2,time:"15:00",name:"鴨川納涼床",sub:"Kamo River",lat:35.0095,lng:135.7694,type:"美食",photo:"https://images.unsplash.com/photo-1526481280695-3c687fd643ed?auto=format&fit=crop&w=700&q=80",note:"傍晚沿河散步，尋找晚餐。"},
      {id:"e",day:3,time:"10:00",name:"嵐山竹林",sub:"Arashiyama Bamboo Grove",lat:35.017,lng:135.6713,type:"自然",photo:"https://images.unsplash.com/photo-1545569341-9eb8b30979d9?auto=format&fit=crop&w=700&q=80",note:"搭嵐電前往，順遊天龍寺。"}
    ];
    let places=JSON.parse(localStorage.getItem(key)||"null")||defaults, day=1, selected=places[0].id, layers=[];
    const map=L.map("map",{zoomControl:false,attributionControl:true}).setView([35.0116,135.7681],12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap contributors"}).addTo(map);L.control.zoom({position:"bottomright"}).addTo(map);
    const $=s=>document.querySelector(s), escape=v=>String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    function toast(message){const el=$("#toast");el.textContent=message;el.classList.add("show");clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.remove("show"),2600)}
    function save(){localStorage.setItem(key,JSON.stringify(places))}
    function current(){return places.filter(p=>p.day===day)}
    function render(){const days=[...new Set(places.map(p=>p.day))].sort((a,b)=>a-b);$("#count").textContent=`${places.length} places`;$("#days").innerHTML=days.map(d=>`<button class="day ${d===day?"active":""}" data-day="${d}">DAY<br><b>${String(d).padStart(2,"0")}</b></button>`).join("");document.querySelectorAll(".day").forEach(b=>b.onclick=()=>{day=+b.dataset.day;selected=current()[0]?.id;render()});$("#place-list").innerHTML=current().map(p=>`<button class="place ${p.id===selected?"active":""}" data-id="${p.id}"><img src="${p.photo}" alt=""><span class="place-info"><time>${p.time} · ${escape(p.type)}</time><strong>${escape(p.name)}</strong><em>${escape(p.sub)}</em></span><span class="chevron">›</span></button>`).join("");document.querySelectorAll(".place").forEach(b=>b.onclick=()=>{selected=b.dataset.id;render()});renderMap();renderDetail()}
    function renderMap(){layers.forEach(x=>map.removeLayer(x));layers=[];const all=current();const route=L.polyline(all.map(p=>[p.lat,p.lng]),{color:"#ef715e",weight:3,dashArray:"7 9",opacity:.9}).addTo(map);if(all.length>1)layers.push(route);all.forEach((p,i)=>{const icon=L.divIcon({className:"marker-wrap",html:`<div class="marker ${p.id===selected?"selected":""}"><b>${i+1}</b></div>`,iconSize:[38,38],iconAnchor:[19,19]});const mark=L.marker([p.lat,p.lng],{icon}).addTo(map).on("click",()=>{selected=p.id;render()});layers.push(mark)});if(all.length)map.flyToBounds(L.latLngBounds(all.map(p=>[p.lat,p.lng])),{padding:[90,90],maxZoom:14,duration:.55})}
    function renderDetail(){const p=places.find(x=>x.id===selected);if(!p){$("#detail").innerHTML="";return}$("#detail").innerHTML=`<img src="${p.photo}" alt="${escape(p.name)}"><div class="detail-body"><div class="detail-label">DAY ${String(p.day).padStart(2,"0")} · ${p.time}</div><h2>${escape(p.name)}</h2><p class="subtitle">${escape(p.sub)}</p><p class="note">${escape(p.note)}</p><div class="coords">📍 ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)} · ${escape(p.type)}</div><button class="save" id="favorite">♡ 收藏這個地點</button></div>`;$("#favorite").onclick=()=>toast("已收藏到你的旅遊靈感")}
    $("#search").onsubmit=async e=>{e.preventDefault();const q=$("#search-text").value.trim();if(!q)return;toast("正在搜尋地點…");try{const r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q="+encodeURIComponent(q));const [v]=await r.json();if(!v)throw Error();const p={id:crypto.randomUUID(),day,time:"14:00",name:v.display_name.split(",")[0],sub:v.display_name,lat:+v.lat,lng:+v.lon,type:"新地點",photo:"https://images.unsplash.com/photo-1526481280695-3c687fd643ed?auto=format&fit=crop&w=700&q=80",note:"由搜尋加入，點擊地圖卡片查看座標與旅遊筆記。"};places.push(p);selected=p.id;$("#search-text").value="";save();render();toast("已加入 Day "+day+" 行程")}catch{toast("找不到地點，請試試更完整的名稱")}};
    $("#add").onclick=()=>{const name=prompt("地點名稱");if(!name)return;const lat=Number(prompt("緯度，例如 35.0116"));const lng=Number(prompt("經度，例如 135.7681"));if(!Number.isFinite(lat)||!Number.isFinite(lng)){toast("座標格式不正確，可改用上方搜尋加入");return}const p={id:crypto.randomUUID(),day,time:"14:00",name,sub:"自行新增的地點",lat,lng,type:"待安排",photo:"https://images.unsplash.com/photo-1542051841857-5f90071e7989?auto=format&fit=crop&w=700&q=80",note:"在此留下交通、預約或必吃清單。"};places.push(p);selected=p.id;save();render();toast("新地點已加入")};
    $("#home").onclick=()=>map.flyTo([35.0116,135.7681],12);$("#all").onclick=()=>{const b=L.latLngBounds(places.map(p=>[p.lat,p.lng]));map.flyToBounds(b,{padding:[70,70],maxZoom:12})};$("#share").onclick=async()=>{try{if(navigator.share)await navigator.share({title:"Atlas Trip｜京都・春日漫遊",url:location.href});else{await navigator.clipboard.writeText(location.href);toast("網址已複製，可直接分享給旅伴")}}catch{}};$("#cloud").onclick=()=>$("#dialog").classList.add("show");$("#dialog-close").onclick=()=>$("#dialog").classList.remove("show");
    $("#download").onclick=()=>{const c=document.createElement("canvas");c.width=1080;c.height=1350;const x=c.getContext("2d");x.fillStyle="#153b38";x.fillRect(0,0,c.width,c.height);x.fillStyle="#ef715e";x.globalAlpha=.15;x.beginPath();x.arc(910,150,330,0,Math.PI*2);x.fill();x.globalAlpha=1;x.fillStyle="#ffb09d";x.font="700 28px sans-serif";x.fillText("ATLAS TRIP",84,130);x.fillStyle="#fffdfa";x.font="700 68px sans-serif";x.fillText("京都・春日漫遊",84,230);x.fillStyle="#d8e4dd";x.font="32px sans-serif";x.fillText("2026.04.03 — 04.07 · Kyoto, Japan",84,285);x.strokeStyle="#83a69b";x.lineWidth=6;x.setLineDash([15,17]);x.beginPath();x.moveTo(120,500);x.lineTo(900,500);x.stroke();x.setLineDash([]);current().slice(0,5).forEach((p,i)=>{const px=120+i*180;x.fillStyle="#ef715e";x.beginPath();x.arc(px,500,22,0,Math.PI*2);x.fill();x.fillStyle="#fffdfa";x.font="700 23px sans-serif";x.textAlign="center";x.fillText(i+1,px,508);x.fillStyle="#d8e4dd";x.font="25px sans-serif";x.fillText(p.name.slice(0,7),px,565)});x.textAlign="left";x.fillStyle="#fffdfa";x.font="600 36px sans-serif";x.fillText(`${places.length} 個收藏地點 · ${new Set(places.map(p=>p.day)).size} 天行程`,84,850);x.fillStyle="#d8e4dd";x.font="28px sans-serif";x.fillText("Made with Atlas Trip",84,1030);const a=document.createElement("a");a.download="atlas-trip-poster.png";a.href=c.toDataURL("image/png");a.click();toast("旅程海報已匯出")};
    render();
  </script>
</body>
</html>
